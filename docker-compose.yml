version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: ai-cms-mongo
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-ai-cms}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ai-cms-backend
    env_file:
      - ./.env
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGO_MODE: direct
      MONGO_URI: mongodb://mongo:27017/ai-cms
      MONGO_URI_LOCAL: ${MONGO_URI_LOCAL:-mongodb://mongo:27017/ai-cms}
      MONGO_URI_ATLAS: ${MONGO_URI_ATLAS:-mongodb+srv://<username>:<password>@<cluster-url>/ai-cms?retryWrites=true&w=majority}
      JWT_SECRET: ${JWT_SECRET:-replace-with-strong-secret-for-development}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      APP_NAME: ${APP_NAME:-AI-CMS Backend}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECT_TIMEOUT_MS: ${DB_CONNECT_TIMEOUT_MS:-2500}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Super Admin}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@aicms.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Admin123!}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
      PRESCRIPTION_PDF_DIR: ${PRESCRIPTION_PDF_DIR:-uploads/prescriptions}
      INVOICE_STORAGE_DIR: ${INVOICE_STORAGE_DIR:-storage/invoices}
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:5000}
      GST_DEFAULT_RATE: ${GST_DEFAULT_RATE:-18}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
      - ./backend/storage:/app/storage
    depends_on:
      mongo:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5000/health',(res)=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: npm run dev

  ai-service:
    build:
      context: ./ai-service
    container_name: ai-cms-ai-service
    env_file:
      - ./.env
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    environment:
      APP_ENV: ${NODE_ENV:-development}
      AI_SERVICE_HOST: ${AI_SERVICE_HOST:-0.0.0.0}
      AI_SERVICE_PORT: 8000
      BACKEND_URL: http://backend:5000
      BACKEND_API_URL: ${BACKEND_API_URL:-http://backend:5000/api/v1}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ORIGINS: ${CORS_ORIGIN:-http://localhost:5173},http://localhost:5000
      AI_SERVICE_NAME: ${AI_SERVICE_NAME:-ai-cms-ai-service}
      MODEL_PROVIDER: ${MODEL_PROVIDER:-placeholder}
      LLM_PROVIDER: ${LLM_PROVIDER:-rule_based}
      LLM_API_KEY: ${LLM_API_KEY:-}
      MODEL_MODE: ${MODEL_MODE:-rule_based_mvp}
      ENABLE_HEAVY_MODELS: ${ENABLE_HEAVY_MODELS:-false}
      ENABLE_MODEL_DOWNLOADS: ${ENABLE_MODEL_DOWNLOADS:-false}
      WHISPER_ENABLED: ${WHISPER_ENABLED:-false}
      OCR_ENABLED: ${OCR_ENABLED:-false}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      AI_MEDICAL_DISCLAIMER: ${AI_MEDICAL_DISCLAIMER:-AI assistance is not a final diagnosis or prescription. Doctor approval is mandatory.}
    volumes:
      - ./ai-service:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').getcode() == 200 else 1)"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
    container_name: ai-cms-frontend
    env_file:
      - ./.env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api/v1}
      VITE_AI_BASE_URL: ${VITE_AI_BASE_URL:-http://localhost:8000/api/v1}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  mongo_data:
  backend_uploads:
